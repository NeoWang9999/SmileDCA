name: Deploy to Cloudflare Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "_headers"
      - "data/**"
      - "pages/**"
      - ".github/workflows/cloudflare-pages-deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build static output
        run: |
          rm -rf dist
          mkdir -p dist
          cp index.html _headers dist/
          cp -R data dist/data
          cp pages/_worker.js dist/_worker.js

      - name: Write Wrangler config
        env:
          CLOUDFLARE_R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
        run: |
          cat > wrangler.toml <<EOF
          name = "smiledca"
          pages_build_output_dir = "dist"
          compatibility_date = "2026-06-01"
          EOF

          if [ -n "$CLOUDFLARE_R2_BUCKET" ]; then
            cat >> wrangler.toml <<EOF
          [[r2_buckets]]
          binding = "SMILEDCA_DATA"
          bucket_name = "$CLOUDFLARE_R2_BUCKET"
          EOF
          fi

      - name: Create Cloudflare Pages project when needed
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest pages project create smiledca --production-branch main || true

      - name: Deploy static output to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest pages deploy dist --project-name smiledca --branch main --commit-hash "${{ github.sha }}"
